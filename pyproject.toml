[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "federal-register-mcp"
version = "0.1.0"
description = "MCP server for the Federal Register API. Proposed rules, final rules, notices, executive orders, and regulatory tracking."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "1102tools" }
]
keywords = ["mcp", "model-context-protocol", "federal-register", "rulemaking", "far", "regulations", "1102"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://1102tools.com"
Repository = "https://github.com/1102tools/federal-register-mcp"

[project.scripts]
federal-register-mcp = "federal_register_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/federal_register_mcp"]
